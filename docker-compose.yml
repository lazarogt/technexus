x-default-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    logging: *default-logging
    mem_limit: 512m
    deploy:
      resources:
        limits:
          memory: 512M
    environment:
      POSTGRES_DB: technexus
      POSTGRES_USER: technexus
      POSTGRES_PASSWORD: technexus
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U technexus -d technexus"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - technexus_internal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    logging: *default-logging
    mem_limit: 256m
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    networks:
      - technexus_internal

  backend:
    build: ./backend
    restart: unless-stopped
    logging: *default-logging
    mem_limit: 512m
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      BACKEND_PORT: 5000
      DATABASE_URL: postgresql://technexus:technexus@postgres:5432/technexus?schema=public
      REDIS_ENABLED: "true"
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-changeme}
      CORS_ORIGIN: http://localhost:3000,http://127.0.0.1:3000
      ANALYTICS_PROVIDER: internal
      EMAIL_ENABLED: "false"
      TECHNEXUS_ADMIN_EMAIL: admin@example.com
      TECHNEXUS_ADMIN_PASSWORD: DemoAdmin123!
    ports:
      - "5000:5000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:5000/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 45s
    networks:
      - technexus_internal

  frontend:
    build:
      context: ./frontend
      args:
        VITE_ANALYTICS_PROVIDER: internal
        VITE_POSTHOG_KEY: ""
        VITE_POSTHOG_HOST: https://app.posthog.com
    restart: unless-stopped
    logging: *default-logging
    mem_limit: 256m
    deploy:
      resources:
        limits:
          memory: 256M
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/healthz >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - technexus_internal

  prometheus:
    image: prom/prometheus:v2.54.1
    profiles: ["monitoring"]
    restart: unless-stopped
    logging: *default-logging
    mem_limit: 256m
    deploy:
      resources:
        limits:
          memory: 256M
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - technexus_internal

  grafana:
    image: grafana/grafana-oss:11.2.0
    profiles: ["monitoring"]
    restart: unless-stopped
    logging: *default-logging
    mem_limit: 256m
    deploy:
      resources:
        limits:
          memory: 256M
    depends_on:
      prometheus:
        condition: service_started
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - technexus_internal

networks:
  technexus_internal:
    driver: bridge

volumes:
  postgres_data:
  grafana_data:
